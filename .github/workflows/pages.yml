# Build prolog.wasm from prolog.wat and publish the web/ REPL to
# GitHub Pages. (Pages must be set to "GitHub Actions" as the source
# under Settings -> Pages.)
name: Deploy web demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  WASM_TOOLS_VERSION: 1.252.0

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install wasm-tools
        run: |
          curl -sSfL "https://github.com/bytecodealliance/wasm-tools/releases/download/v${WASM_TOOLS_VERSION}/wasm-tools-${WASM_TOOLS_VERSION}-x86_64-linux.tar.gz" | tar xz
          echo "$PWD/wasm-tools-${WASM_TOOLS_VERSION}-x86_64-linux" >> "$GITHUB_PATH"

      - name: Build prolog.wasm into web/
        run: |
          wasm-tools parse prolog.wat -o web/prolog.wasm
          wasm-tools validate web/prolog.wasm

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4
